name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue! Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: Find this in Settings > Community plugins > Agentic Copilot
      placeholder: e.g. 1.3.1
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: CLI agent
      description: Which agentic CLI tool are you using?
      options:
        - Claude Code
        - Opencode
        - Gemini CLI
        - Custom / other
    validations:
      required: true

  - type: input
    id: agent-version
    attributes:
      label: CLI agent version
      description: "Run `claude --version`, `opencode --version`, etc."
      placeholder: e.g. claude 1.0.16
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Open a note in the vault
        2. Open the Agentic Copilot sidebar
        3. Type `/compact` and press Enter
        4. Observe that the text is sent as a prompt instead of executing the command
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment info.
      placeholder: |
        - OS: macOS 15.4 / Windows 11 / Linux
        - Obsidian version: 1.8.x
        - Install method: Community plugins / Manual
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console logs / screenshots
      description: Open the developer console (Cmd+Option+I / Ctrl+Shift+I), reproduce the issue, and paste any errors here. Screenshots also welcome.
      render: text
    validations:
      required: false
